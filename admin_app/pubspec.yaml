name: admin_app
description: EduMarket — Admin Control Panel
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Navigation
  go_router: ^14.0.0
  # State Management
  flutter_riverpod: ^2.5.1
  # HTTP
  dio: ^5.4.3+1
  # Charts
  fl_chart: ^0.69.0
  # Fonts
  google_fonts: ^6.2.1
  # Local storage for JWT
  shared_preferences: ^2.3.0
  # Animations
  flutter_animate: ^4.5.0
  # File picking for image uploads
  file_picker: ^11.0.2
  flutter_local_notifications: ^17.0.0
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  url_launcher: ^6.3.2
  flutter_pdfview: ^1.3.2
  http: ^1.2.0
  path_provider: ^2.1.4
  google_sign_in: ^6.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
